version: 0.2
workspace:
  # Type indicates which provider to use when building the workspace.
  # It corrosponds to the `kubernetes` section in the `specs` section.
  type: kubernetes
  specs:
    kubernetes:
      image: 
        value: index.docker.io/ubuntu
      container-based-vm: 
        value: true
      cpu: 
        value: 2
      memory: 
        value: 2
      disk: 
        value: 12
      gpuCount: 
        value: 0
      labels:
        value:
          com.coder.custom.hello: "hello"
          com.coder.custom.world: "world"
  configure:
    start:
      value:
        - name: "install curl"
          command: |
            apt update
            apt install -y curl
        - name: "install Go binary"
          command: "go install"
          directory: /home/coder/go/src/github.com/my-project
          shell: "bash"
          env:
            GOPATH: /home/coder/go
  devURLs:
    value:
      - name: PublicPortAgain
        port: 1234
        scheme: https
        access: public
